version: "3.9"

# Ambiente de produção/staging.
# Use: docker compose up -d

services:
  db:
    image: postgres:15-alpine
    container_name: fpa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DW_NAME:-financeiro_dw}
      POSTGRES_USER: ${DW_USER:-fpa_user}
      POSTGRES_PASSWORD: ${DW_PASSWORD:?DW_PASSWORD obrigatorio}
    volumes:
      - fpa_db_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_USER:-fpa_user} -d ${DW_NAME:-financeiro_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fpa_internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fpa_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DW_USER}:${DW_PASSWORD}@db:5432/${DW_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fpa_internal
      - fpa_external
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: fpa_etl
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DW_USER}:${DW_PASSWORD}@db:5432/${DW_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fpa_internal
    # Para execução via cron, sobrescreva o command:
    # command: ["python", "pipeline.py", "--full-load"]

  metabase:
    image: metabase/metabase:v0.50.0
    container_name: fpa_metabase
    restart: unless-stopped
    environment:
      # Banco de metadados do Metabase (separado do DW)
      MB_DB_TYPE: postgres
      MB_DB_HOST: db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${MB_DB_USER:-metabase_user}
      MB_DB_PASS: ${MB_DB_PASS:?MB_DB_PASS obrigatorio}
      # URL pública — usada em links de e-mail e compartilhamento
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost/metabase}
      MB_EMOJI_IN_LOGS: "false"
      JAVA_TIMEZONE: America/Sao_Paulo
    volumes:
      - fpa_metabase_data:/metabase-data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - fpa_internal
      - fpa_external

  nginx:
    image: nginx:1.25-alpine
    container_name: fpa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
      - metabase
    networks:
      - fpa_external

volumes:
  fpa_db_data:
  fpa_metabase_data:

networks:
  fpa_internal:
    driver: bridge
  fpa_external:
    driver: bridge
